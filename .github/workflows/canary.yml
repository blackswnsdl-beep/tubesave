name: yt-dlp client canary

# 수동 실행 전용. 안드로이드와 동일한 JS-free 도커로 유튜브 테스트 →
# player_client이 막혔으면 동작하는 값으로 tubesave_config.json 자동 갱신 후 커밋.
#
# 참고: GitHub Actions 러너는 데이터센터 IP라 유튜브가 봇으로 차단함
# ("Sign in to confirm you're not a bot"). 정기 점검은 가정용 IP인 NAS에서 실행.
# 그래서 schedule(cron) 트리거는 제거하고 수동 실행(workflow_dispatch)만 남김.
on:
  workflow_dispatch:

permissions:
  contents: write   # config.json 커밋/푸시 권한

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build canary image (no JS runtime → mirrors Android)
        run: docker build -t tubesave-canary automation

      - name: Run canary
        run: |
          set +e
          # 이미지 기본 ENTRYPOINT(run-canary.sh, NAS용 토큰 루프) 대신
          # canary.py 를 직접 1회 실행. config 만 고치고 push 는 아래 스텝이 담당하므로 DRY_RUN=1.
          docker run --rm \
            --entrypoint python \
            -e CONFIG_PATH=/work/tubesave_config.json \
            -e DRY_RUN=1 \
            -v "$GITHUB_WORKSPACE:/work" \
            tubesave-canary /app/canary.py
          code=$?
          set -e
          echo "canary exit code: $code"
          if [ "$code" -eq 2 ]; then
            echo "::error::모든 클라이언트 실패 — 라이브러리 갱신/수동 점검 필요"
            exit 1
          fi
          if [ "$code" -eq 3 ]; then
            echo "::error::설정 파일 없음/환경 오류 — canary.py FATAL"
            exit 1
          fi

      - name: Commit if changed
        if: always()
        run: |
          if ! git diff --quiet -- tubesave_config.json; then
            git config user.name "tubesave-canary-bot"
            git config user.email "actions@users.noreply.github.com"
            git add tubesave_config.json
            git commit -m "canary: auto-update extractor_args"
            git push
            echo "tubesave_config.json 갱신 푸시 완료"
          else
            echo "변경 없음"
          fi
